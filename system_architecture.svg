<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1629;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2340;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="psGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c3a5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#122540;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3a25;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a2518;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="runtimeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e4a7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#163660;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dmrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a07a10;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tmrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c05520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a3a15;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="peGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e2a36;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64b5f6"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#64b5f6"/>
    </marker>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#90caf9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#e8f4fd" letter-spacing="1">DNN Inference Acceleration System — PYNQ-Z2 FPGA</text>
  <line x1="100" y1="48" x2="860" y2="48" stroke="#3a6fa8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ═══════════════════════════ SoC outer box ═══════════════════════════ -->
  <rect x="30" y="58" width="900" height="520" rx="14" fill="none" stroke="#3a6fa8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="480" y="76" text-anchor="middle" font-size="12" fill="#7aadda" letter-spacing="2">PYNQ-Z2  SoC  (Zynq XC7Z020)</text>

  <!-- ═══════════════════════════ PS Block ═══════════════════════════ -->
  <rect x="42" y="84" width="390" height="468" rx="12" fill="url(#psGrad)" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
  <!-- PS Title -->
  <rect x="42" y="84" width="390" height="36" rx="12" fill="#2155a0"/>
  <rect x="42" y="104" width="390" height="16" fill="#2155a0"/>
  <text x="237" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">PS: ARM Cortex-A9</text>
  <text x="237" y="117" text-anchor="middle" font-size="11" fill="#a0c8f0">(Processing System)</text>

  <!-- Jupyter box -->
  <rect x="58" y="130" width="358" height="300" rx="9" fill="#162d4a" stroke="#3a75b5" stroke-width="1.2"/>
  <text x="237" y="149" text-anchor="middle" font-size="11" fill="#7ab8e8" font-style="italic">Jupyter Notebook  (Python)</text>

  <!-- DNN Runtime box -->
  <rect x="70" y="157" width="334" height="256" rx="8" fill="url(#runtimeGrad)" stroke="#4a8fd6" stroke-width="1"/>
  <text x="237" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#c8e0f8">DNN Inference Runtime</text>
  <line x1="82" y1="180" x2="392" y2="180" stroke="#3a75b5" stroke-width="0.8"/>

  <!-- PL-offloaded layers (blue pills) -->
  <!-- Conv2D -->
  <rect x="86" y="188" width="302" height="26" rx="6" fill="#1565c0" stroke="#42a5f5" stroke-width="1"/>
  <text x="140" y="205" font-size="10" fill="#ffffff">▶  Conv2D offload</text>
  <text x="350" y="205" text-anchor="end" font-size="9" fill="#90caf9" font-style="italic">→ PL (Systolic)</text>
  <!-- FC -->
  <rect x="86" y="220" width="302" height="26" rx="6" fill="#1565c0" stroke="#42a5f5" stroke-width="1"/>
  <text x="140" y="237" font-size="10" fill="#ffffff">▶  FC (Linear) offload</text>
  <text x="350" y="237" text-anchor="end" font-size="9" fill="#90caf9" font-style="italic">→ PL (Systolic)</text>

  <!-- Divider -->
  <line x1="82" y1="253" x2="392" y2="253" stroke="#2a4a6a" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="237" y="264" text-anchor="middle" font-size="9" fill="#5580a0" font-style="italic">Pure Python (PS only)</text>

  <!-- Python-only layers -->
  <rect x="86" y="270" width="140" height="24" rx="5" fill="#1a3a5c" stroke="#2a6090" stroke-width="1"/>
  <text x="156" y="285" text-anchor="middle" font-size="10" fill="#a8d4f0">ReLU</text>

  <rect x="238" y="270" width="150" height="24" rx="5" fill="#1a3a5c" stroke="#2a6090" stroke-width="1"/>
  <text x="313" y="285" text-anchor="middle" font-size="10" fill="#a8d4f0">MaxPool2D</text>

  <rect x="86" y="300" width="140" height="24" rx="5" fill="#1a3a5c" stroke="#2a6090" stroke-width="1"/>
  <text x="156" y="315" text-anchor="middle" font-size="10" fill="#a8d4f0">Flatten</text>

  <rect x="238" y="300" width="150" height="24" rx="5" fill="#1a3a5c" stroke="#2a6090" stroke-width="1"/>
  <text x="313" y="315" text-anchor="middle" font-size="10" fill="#a8d4f0">Softmax / Argmax</text>

  <!-- Weight converter note -->
  <rect x="86" y="332" width="302" height="40" rx="5" fill="#0d2235" stroke="#244a6a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="237" y="348" text-anchor="middle" font-size="9" fill="#6090b8">Weight conversion (PC-side):</text>
  <text x="237" y="362" text-anchor="middle" font-size="9" fill="#4a80a8">  .pth (PyTorch)  →  .bin (raw bytes)  →  PYNQ-Z2 filesystem</text>

  <!-- Im2col note -->
  <rect x="86" y="380" width="302" height="26" rx="5" fill="#0d2a1a" stroke="#1a5a30" stroke-width="1"/>
  <text x="237" y="394" text-anchor="middle" font-size="9" fill="#60c080">Im2col transform: Conv2D  →  Matrix Multiply  (tiled NxN)</text>
  <text x="237" y="406" text-anchor="middle" font-size="9" fill="#3a8050">input[C,H,W]  ─im2col→  A[CkHkW, HoWo]   B = weight[Co, CkHkW]</text>

  <!-- Model & Dataset box -->
  <rect x="58" y="440" width="358" height="96" rx="9" fill="#142040" stroke="#2a5080" stroke-width="1.2"/>
  <text x="237" y="459" text-anchor="middle" font-size="11" font-weight="bold" fill="#80b8e0">Model &amp; Dataset Manager</text>
  <line x1="70" y1="463" x2="404" y2="463" stroke="#2a5080" stroke-width="0.8"/>

  <circle cx="84" cy="477" r="3" fill="#4a90d9"/>
  <text x="92" y="481" font-size="10" fill="#a0c8e8">Load model config (JSON) + weights (.bin) at runtime</text>
  <circle cx="84" cy="494" r="3" fill="#4a90d9"/>
  <text x="92" y="498" font-size="10" fill="#a0c8e8">Selectable dataset: any image folder on SD card</text>
  <circle cx="84" cy="511" r="3" fill="#4a90d9"/>
  <text x="92" y="515" font-size="10" fill="#a0c8e8">Auto-tile based on N and layer dimensions</text>
  <circle cx="84" cy="528" r="3" fill="#4a90d9"/>
  <text x="92" y="532" font-size="10" fill="#a0c8e8">Input: RGB 32×32  /  Output: class 0..42 (GTSRB)</text>

  <!-- ═══════════════════════════ CENTER AXI ARROWS ═══════════════════════════ -->
  <!-- Arrow right (PS→PL, send) -->
  <line x1="438" y1="260" x2="520" y2="260" stroke="#64b5f6" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <!-- Arrow left (PL→PS, recv) -->
  <line x1="520" y1="290" x2="438" y2="290" stroke="#64b5f6" stroke-width="2.5" marker-end="url(#arrowL)"/>
  <!-- Label -->
  <rect x="432" y="300" width="94" height="34" rx="5" fill="#0d1a2e" stroke="#2a50a0" stroke-width="1"/>
  <text x="479" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="#64b5f6">AXI-Stream</text>
  <text x="479" y="327" text-anchor="middle" font-size="9" fill="#4090d0">DMA (HP0)</text>

  <!-- ═══════════════════════════ PL Block ═══════════════════════════ -->
  <rect x="528" y="84" width="390" height="468" rx="12" fill="url(#plGrad)" stroke="#3cb371" stroke-width="2" filter="url(#shadow)"/>
  <!-- PL Title -->
  <rect x="528" y="84" width="390" height="36" rx="12" fill="#155a30"/>
  <rect x="528" y="104" width="390" height="16" fill="#155a30"/>
  <text x="723" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">PL: FPGA Fabric</text>
  <text x="723" y="117" text-anchor="middle" font-size="11" fill="#80d8a0">(Programmable Logic)</text>

  <!-- mm_axi wrapper -->
  <rect x="544" y="128" width="358" height="38" rx="7" fill="#0e3520" stroke="#2a8050" stroke-width="1.2"/>
  <text x="723" y="144" text-anchor="middle" font-size="11" font-weight="bold" fill="#60d890">mm_axi.v</text>
  <text x="723" y="158" text-anchor="middle" font-size="9" fill="#40a060">AXI-Stream wrapper  (parameters: M=N, D_W=8)</text>

  <!-- Arrow mm_axi → mm -->
  <line x1="723" y1="166" x2="723" y2="178" stroke="#3cb371" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- mm controller -->
  <rect x="544" y="178" width="358" height="44" rx="7" fill="#0e3520" stroke="#2a8050" stroke-width="1.2"/>
  <text x="723" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#60d890">mm.sv  (Controller)</text>
  <text x="723" y="212" text-anchor="middle" font-size="9" fill="#40a060">Write M0+M1 to BRAM  │  trigger multiply  │  read M2 via DMA</text>

  <!-- Arrow mm → systolic -->
  <line x1="723" y1="222" x2="723" y2="234" stroke="#3cb371" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- systolic wrapper -->
  <rect x="544" y="234" width="358" height="230" rx="8" fill="#0b2a1a" stroke="#2a6040" stroke-width="1.5"/>
  <text x="723" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#50c878">systolic.sv  —  NxN PE Grid</text>
  <line x1="556" y1="257" x2="890" y2="257" stroke="#2a6040" stroke-width="0.8"/>

  <!-- PE Grid 3x3 -->
  <!-- Row 0 -->
  <!-- PE(0,0) DMR -->
  <rect x="570" y="265" width="84" height="52" rx="7" fill="url(#dmrGrad)" stroke="#f5c518" stroke-width="1.5"/>
  <text x="612" y="286" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">PE (0,0)</text>
  <rect x="582" y="292" width="60" height="16" rx="3" fill="#8a6010"/>
  <text x="612" y="303" text-anchor="middle" font-size="8" fill="#ffe080">DMR</text>

  <!-- PE(0,1) DMR -->
  <rect x="668" y="265" width="84" height="52" rx="7" fill="url(#dmrGrad)" stroke="#f5c518" stroke-width="1.5"/>
  <text x="710" y="286" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">PE (0,1)</text>
  <rect x="680" y="292" width="60" height="16" rx="3" fill="#8a6010"/>
  <text x="710" y="303" text-anchor="middle" font-size="8" fill="#ffe080">DMR</text>

  <!-- PE(0,2) unprotected -->
  <rect x="766" y="265" width="84" height="52" rx="7" fill="url(#peGrad)" stroke="#4a6a80" stroke-width="1.2"/>
  <text x="808" y="286" text-anchor="middle" font-size="9" font-weight="bold" fill="#ccd8e0">PE (0,2)</text>
  <rect x="778" y="292" width="60" height="16" rx="3" fill="#1e2e3a"/>
  <text x="808" y="303" text-anchor="middle" font-size="8" fill="#6a8a9a">Unprotected</text>

  <!-- Horizontal arrows row 0 -->
  <line x1="654" y1="291" x2="668" y2="291" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <line x1="752" y1="291" x2="766" y2="291" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowR)"/>

  <!-- Row 1 -->
  <!-- PE(1,0) TMR -->
  <rect x="570" y="330" width="84" height="52" rx="7" fill="url(#tmrGrad)" stroke="#ff7043" stroke-width="1.5"/>
  <text x="612" y="351" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">PE (1,0)</text>
  <rect x="582" y="357" width="60" height="16" rx="3" fill="#6a2510"/>
  <text x="612" y="368" text-anchor="middle" font-size="8" fill="#ffb090">TMR</text>

  <!-- PE(1,1) TMR -->
  <rect x="668" y="330" width="84" height="52" rx="7" fill="url(#tmrGrad)" stroke="#ff7043" stroke-width="1.5"/>
  <text x="710" y="351" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">PE (1,1)</text>
  <rect x="680" y="357" width="60" height="16" rx="3" fill="#6a2510"/>
  <text x="710" y="368" text-anchor="middle" font-size="8" fill="#ffb090">TMR</text>

  <!-- PE(1,2) unprotected -->
  <rect x="766" y="330" width="84" height="52" rx="7" fill="url(#peGrad)" stroke="#4a6a80" stroke-width="1.2"/>
  <text x="808" y="351" text-anchor="middle" font-size="9" font-weight="bold" fill="#ccd8e0">PE (1,2)</text>
  <rect x="778" y="357" width="60" height="16" rx="3" fill="#1e2e3a"/>
  <text x="808" y="368" text-anchor="middle" font-size="8" fill="#6a8a9a">Unprotected</text>

  <!-- Horizontal arrows row 1 -->
  <line x1="654" y1="356" x2="668" y2="356" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <line x1="752" y1="356" x2="766" y2="356" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowR)"/>

  <!-- Row 2 -->
  <!-- PE(2,0) unprotected -->
  <rect x="570" y="395" width="84" height="52" rx="7" fill="url(#peGrad)" stroke="#4a6a80" stroke-width="1.2"/>
  <text x="612" y="416" text-anchor="middle" font-size="9" font-weight="bold" fill="#ccd8e0">PE (2,0)</text>
  <rect x="582" y="422" width="60" height="16" rx="3" fill="#1e2e3a"/>
  <text x="612" y="433" text-anchor="middle" font-size="8" fill="#6a8a9a">Unprotected</text>

  <!-- PE(2,1) unprotected -->
  <rect x="668" y="395" width="84" height="52" rx="7" fill="url(#peGrad)" stroke="#4a6a80" stroke-width="1.2"/>
  <text x="710" y="416" text-anchor="middle" font-size="9" font-weight="bold" fill="#ccd8e0">PE (2,1)</text>
  <rect x="680" y="422" width="60" height="16" rx="3" fill="#1e2e3a"/>
  <text x="710" y="433" text-anchor="middle" font-size="8" fill="#6a8a9a">Unprotected</text>

  <!-- PE(2,2) unprotected -->
  <rect x="766" y="395" width="84" height="52" rx="7" fill="url(#peGrad)" stroke="#4a6a80" stroke-width="1.2"/>
  <text x="808" y="416" text-anchor="middle" font-size="9" font-weight="bold" fill="#ccd8e0">PE (2,2)</text>
  <rect x="778" y="422" width="60" height="16" rx="3" fill="#1e2e3a"/>
  <text x="808" y="433" text-anchor="middle" font-size="8" fill="#6a8a9a">Unprotected</text>

  <!-- Horizontal arrows row 2 -->
  <line x1="654" y1="421" x2="668" y2="421" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <line x1="752" y1="421" x2="766" y2="421" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowR)"/>

  <!-- Vertical arrows (M1 feed top-down) -->
  <line x1="612" y1="317" x2="612" y2="330" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="710" y1="317" x2="710" y2="330" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="808" y1="317" x2="808" y2="330" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="612" y1="382" x2="612" y2="395" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="710" y1="382" x2="710" y2="395" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="808" y1="382" x2="808" y2="395" stroke="#64b5f6" stroke-width="1.2" marker-end="url(#arrowDown)"/>

  <!-- Legend inside systolic box -->
  <rect x="556" y="454" width="328" height="4" rx="2" fill="#1a4030"/>
  <!-- DMR legend -->
  <rect x="570" y="462" width="14" height="10" rx="2" fill="url(#dmrGrad)" stroke="#f5c518" stroke-width="1"/>
  <text x="589" y="471" font-size="9" fill="#f5c518">DMR (Dual) — detects fault</text>
  <!-- TMR legend -->
  <rect x="700" y="462" width="14" height="10" rx="2" fill="url(#tmrGrad)" stroke="#ff7043" stroke-width="1"/>
  <text x="719" y="471" font-size="9" fill="#ff7043">TMR (Triple) — corrects fault</text>

  <!-- Banked BRAM arrow -->
  <line x1="723" y1="464" x2="723" y2="478" stroke="#3cb371" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Banked BRAMs -->
  <rect x="544" y="478" width="358" height="58" rx="7" fill="#0a2018" stroke="#2a7040" stroke-width="1.5"/>
  <text x="723" y="496" text-anchor="middle" font-size="11" font-weight="bold" fill="#50c878">Banked BRAMs</text>
  <!-- M0 -->
  <rect x="558" y="503" width="96" height="22" rx="4" fill="#0e3020" stroke="#2a7040" stroke-width="1"/>
  <text x="606" y="517" text-anchor="middle" font-size="10" fill="#60d890">M0 (input A)</text>
  <!-- M1 -->
  <rect x="666" y="503" width="96" height="22" rx="4" fill="#0e3020" stroke="#2a7040" stroke-width="1"/>
  <text x="714" y="517" text-anchor="middle" font-size="10" fill="#60d890">M1 (input B)</text>
  <!-- M2 -->
  <rect x="774" y="503" width="116" height="22" rx="4" fill="#0e3020" stroke="#2a7040" stroke-width="1"/>
  <text x="832" y="517" text-anchor="middle" font-size="10" fill="#60d890">M2 (result)</text>

  <!-- ═══════════════════════════ TCL configure note ═══════════════════════════ -->
  <rect x="544" y="544" width="358" height="34" rx="7" fill="#101a10" stroke="#2a4a20" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="723" y="558" text-anchor="middle" font-size="9" fill="#60a050">⚙  Protection mode configured per-PE via TCL at synthesis time</text>
  <text x="723" y="571" text-anchor="middle" font-size="9" fill="#406030">set_protection.tcl  →  selects  pe.v / pe_dmr.v / pe_tmr.v  per (i,j)</text>

  <!-- ═══════════════════════════ LAN / Ethernet footer ═══════════════════════════ -->
  <line x1="237" y1="600" x2="237" y2="618" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="140" y1="618" x2="660" y2="618" stroke="#90caf9" stroke-width="1.5"/>
  <line x1="660" y1="600" x2="660" y2="618" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- LAN arrow -->
  <polygon points="478,608 490,618 478,628 466,618" fill="#1a3a6a" stroke="#90caf9" stroke-width="1.2"/>
  <rect x="500" y="609" width="220" height="18" rx="6" fill="#0d1a2e" stroke="#2a4a80" stroke-width="1"/>
  <text x="610" y="621" text-anchor="middle" font-size="9" fill="#90caf9">LAN / Ethernet  →  Jupyter Notebook Server  →  Developer PC Browser</text>

  <!-- ═══════════════════════════ Data flow labels ═══════════════════════════ -->
  <!-- Left of PS: inputs -->
  <text x="237" y="596" text-anchor="middle" font-size="9" fill="#5580a8">PS (ARM) controls inference flow + handles non-compute layers</text>
</svg>
